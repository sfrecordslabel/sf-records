<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Records</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<header>

<img src="Nowy_projekt-23.png" class=".logo{
    width:260px;
    animation:
        float 4s ease-in-out infinite,
        glow 2s ease-in-out infinite alternate,
        pulse 2.5s ease-in-out infinite;
    filter:drop-shadow(0 0 10px #ff0000);
    transition:0.4s;
    cursor:pointer;
}

.logo:hover{
    transform:scale(1.08) rotate(2deg);
    filter:
        drop-shadow(0 0 20px #ff0000)
        drop-shadow(0 0 40px #ff0000)
        drop-shadow(0 0 80px #ff0000);
}

@keyframes glow{
    0%{
        filter:
        drop-shadow(0 0 10px #ff0000)
        drop-shadow(0 0 20px #ff0000);
    }

    100%{
        filter:
        drop-shadow(0 0 30px #ff0000)
        drop-shadow(0 0 60px #ff0000)
        drop-shadow(0 0 100px #ff0000);
    }
}

@keyframes float{
    0%,100%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-12px);
    }
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.04);
    }
}">

<h1>SF RECORDS</h1>

<p>THE NEXT GENERATION OF SOUND</p>

<div class="buttons">
<a href="#releases">LISTEN</a>
<a href="#demo">SEND DEMO</a>
</div>

</header>

<section id="about">

<h2>ABOUT</h2>

<p>
SF Records is an independent music label focused on discovering new talent and creating the next generation of sound.
</p>

</section>

<section id="contact">

<h2>CONTACT</h2>

<p>Email: sfrecorddss@gmail.com</p>

<p>Instagram: @sf_recordss</p>

</section>

</body>
</html>
