<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Records</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loader">
    <h1>SF</h1>
</div>

<nav class="navbar">
    <div class="logo">SF RECORDS</div>

    <div class="nav-links">
        <a href="#home">HOME</a>
        <a href="#demo">SEND DEMO</a>
        <a href="#contact">CONTACT</a>
    </div>
</nav>

<section class="hero" id="home">

<div class="bg"></div>

<h1>SF</h1>

<h2>RECORDS</h2>

<p>THE NEXT GENERATION OF SOUND</p>

<a href="#demo" class="button">
SEND DEMO
</a>

</section>

<section id="demo">

<h3>SEND DEMO</h3>

<form action="https://formsubmit.co/sfrecorddss@gmail.com" method="POST">

<input
type="text"
name="name"
placeholder="Artist Name"
required>

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="url"
name="demo"
placeholder="Demo Link"
required>

<textarea
name="message"
placeholder="Message">
</textarea>

<button type="submit">
SEND DEMO
</button>

</form>

</section>

<footer id="contact">

<h3>CONTACT</h3>

<p>@sf_recordss</p>

<p>sfrecorddss@gmail.com</p>

</footer>

<button id="music-toggle">

<svg width="22" height="22" viewBox="0 0 24 24" fill="none">

<path
d="M5 9V15H9L14 20V4L9 9H5Z"
fill="white"/>

<path
d="M17 9C18.5 10.2 18.5 13.8 17 15"
stroke="white"
stroke-width="2"
stroke-linecap="round"/>

<path
d="M19.5 6.5C22 9 22 15 19.5 17.5"
stroke="white"
stroke-width="2"
stroke-linecap="round"/>

</svg>

</button>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
